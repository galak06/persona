name: CI

on:
  push:
    branches: [main]
    paths:
      - "social-automation/**"
  pull_request:
    branches: [main]
    paths:
      - "social-automation/**"

defaults:
  run:
    working-directory: social-automation

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check (lint)
        run: ruff check lib/ scripts/ tests/

      - name: Ruff format check
        run: ruff format --check lib/ scripts/ tests/

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Mypy
        run: mypy lib/ --ignore-missing-imports

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests with coverage
        run: pytest --cov=lib --cov-report=term-missing --cov-fail-under=70

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check for secrets in code
        run: |
          # Fail if bot tokens or credentials are committed
          if grep -rn "bot_token.*:" lib/ scripts/ tests/ --include="*.py" | grep -v "_config\|config_file\|cfg\|environ\|get("; then
            echo "ERROR: Possible hardcoded credentials found"
            exit 1
          fi
          echo "No hardcoded credentials found"

      - name: Check for dangerous patterns
        run: |
          # Fail if eval() or exec() are used
          if grep -rn "eval(\|exec(" lib/ scripts/ --include="*.py" | grep -v "page.evaluate\|#.*eval"; then
            echo "ERROR: Dangerous eval/exec usage found"
            exit 1
          fi
          echo "No dangerous patterns found"
