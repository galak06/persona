# Persona — Shared worker Compose
#
# ONE dispatcher + ONE worker for the whole deployment, serving every brand
# (replaces the earlier one-container-per-brand model). Which brands to
# dispatch/poll comes from Postgres (`brands.brand_dir`/`status`), not this
# process's own fixed identity -- see scripts/task_dispatcher.py::run_all_brands()
# and scripts/task_worker.py::run_loop_all_brands(). Start once, no per-brand
# `-p <slug>` project or `BRAND_DIR`/`PERSONA_BRAND` env vars needed:
#
#   docker compose -f docker-compose.worker.yml up -d
#
# Requires the shared stack (docker-compose.yml) to already be running —
# this file joins its `persona_net` network (declared `external: true` below)
# to resolve the `postgres`/`redis`/`api` hostnames.
#
# Two services (PR7 producer/consumer split, now brand-agnostic):
#   dispatcher — scripts/task_dispatcher.py --loop: reads every brand's due
#                schedule_tasks rows and pushes each onto that brand's own
#                Redis `flow-run` queue. Never launches a browser, so it
#                builds off the lightweight Dockerfile.api image (no
#                Playwright/Chromium).
#   worker     — scripts/task_worker.py --loop: round-robin pops every
#                brand's queue and actually runs each task's script
#                (ig_scan.py/fb_scan.py/fb_group_scout.py/...) as a
#                subprocess, with that task's own brand_dir/credentials
#                (lib.local_env.load_brand_env) injected into just that
#                subprocess call. Builds off Dockerfile.worker (has
#                Playwright/Chromium).
#
# Both mount the whole `./brands` root at `/app/brands` -- the SAME
# container-internal path docker-compose.yml's `api` service already uses
# (both Dockerfiles set WORKDIR /app) -- instead of one bind-mounted
# `${BRAND_DIR}` per brand. This is load-bearing, not cosmetic:
# `brands.brand_dir` (Postgres) stores ONE path value read by every
# container, so every container must agree on the same mount point for
# that value to resolve correctly.

version: "3.9"

services:
  # ── Dispatcher (croniter due-check, pure producer) ──────────────────────────
  dispatcher:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    environment:
      # Satisfies lib.config's module-level settings singleton, which
      # requires SOME valid BRAND_DIR to import at all -- never consulted
      # for actual dispatch decisions (those resolve per-brand from
      # Postgres). brands/_shared is a dedicated placeholder config, not a
      # real brand.
      - BRAND_DIR=/app/brands/_shared
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://${POSTGRES_USER:-persona}:${POSTGRES_PASSWORD:-persona}@postgres:5432/${POSTGRES_DB:-persona}
    volumes:
      # Read-only: the dispatcher only reads brand config -- it never
      # writes to any brand folder (no session/browser state, no
      # worker_runs writes -- those are Postgres, done by `worker`).
      - ./brands:/app/brands:ro
    networks:
      - persona_net
    command: ["python", "scripts/task_dispatcher.py", "--loop"]

  # ── Worker (consumer, browser-driven scan/scrape flows) ─────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    environment:
      - BRAND_DIR=/app/brands/_shared
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://${POSTGRES_USER:-persona}:${POSTGRES_PASSWORD:-persona}@postgres:5432/${POSTGRES_DB:-persona}
      - PLAYWRIGHT_HEADLESS=1
    volumes:
      # Read-write: the worker writes session/browser state, logs, and
      # queue files into whichever brand a given task's brand_dir points
      # at. One shared mount, not a per-brand bind mount -- every brand's
      # subdirectory under here is already writable.
      - ./brands:/app/brands:rw
      - playwright_cache:/ms-playwright
    networks:
      - persona_net
    command: ["python", "scripts/task_worker.py", "--loop"]

networks:
  persona_net:
    external: true

volumes:
  playwright_cache:
