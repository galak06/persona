# Minimal single-node Loki config — filesystem storage, no auth.
# Internal-network only (not published on a host port beyond 3100 for
# Grafana's own datasource query access); not meant for multi-tenant or
# production-scale log volume.

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  # Persona's flow logs are low-volume (a handful of scripts, a few runs a
  # day) -- defaults are conservative for a single self-hosted instance;
  # raise if log volume grows.
  retention_period: 720h  # 30 days
  reject_old_samples: true
  reject_old_samples_max_age: 168h

compactor:
  working_directory: /loki/compactor
  retention_enabled: true
  delete_request_store: filesystem
