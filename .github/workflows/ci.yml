name: CI

on:
  push:
    paths:
      - "persona/**"
  pull_request:
    paths:
      - "persona/**"
  workflow_dispatch:

defaults:
  run:
    working-directory: persona

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      # Scoped to the local-Postgres/multi-brand work (PR1+): the rest of
      # lib/scripts/tests has ~146 pre-existing lint errors and ~98 files
      # with pre-existing format drift, unrelated to this work. Extend this
      # list as each new PR in this initiative adds its own files.
      - name: Ruff check (lint)
        run: >-
          ruff check
          lib/db.py lib/db_pool.py
          lib/groups_db/db.py lib/groups_db/repository.py
          lib/engagements_db/db.py lib/engagements_db/repository.py
          lib/worker_db.py lib/schedule_db.py
          tests/test_db.py tests/test_groups_db.py tests/test_engagements_db.py
          tests/test_worker_db.py tests/test_schedule_db.py

      - name: Ruff format check
        run: >-
          ruff format --check
          lib/db.py lib/db_pool.py
          lib/groups_db/db.py lib/groups_db/repository.py
          lib/engagements_db/db.py lib/engagements_db/repository.py
          lib/worker_db.py lib/schedule_db.py
          tests/test_db.py tests/test_groups_db.py tests/test_engagements_db.py
          tests/test_worker_db.py tests/test_schedule_db.py

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Mypy
        run: >-
          mypy
          lib/db.py lib/db_pool.py
          lib/groups_db/db.py lib/groups_db/repository.py
          lib/engagements_db/db.py lib/engagements_db/repository.py
          lib/worker_db.py lib/schedule_db.py
          --ignore-missing-imports

  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: persona
          POSTGRES_PASSWORD: persona
          POSTGRES_DB: persona
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U persona -d persona"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Matches .env.example's DATABASE_URL convention (lib/db_pool.py reads
      # this). Makes the groups_db/engagements_db/worker_db/schedule_db
      # integration tests (tests/test_db.py et al.) run for real here instead
      # of skipping via their requires_postgres skipif guard.
      DATABASE_URL: postgresql://persona:persona@localhost:5432/persona
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Apply Postgres schema
        run: psql "$DATABASE_URL" -f db/schema.sql

      - name: Run tests with coverage
        # Scoped to the local-Postgres/multi-brand work (PR1+), not the full
        # suite: ~41 pre-existing, unrelated tests fail today (mostly
        # recipes_db/Supabase-dependent tests with no creds in CI, plus a
        # handful of unrelated failures in rate_limiter/campaigns/comment_generator).
        # Fixing those is a separate, unplanned, out-of-scope effort. Extend
        # this list as each new PR in this initiative adds its own tests.
        run: |
          pytest \
            tests/test_db.py \
            tests/test_groups_db.py \
            tests/test_engagements_db.py \
            tests/test_worker_db.py \
            tests/test_schedule_db.py \
            --cov=lib.db --cov=lib.db_pool --cov=lib.groups_db \
            --cov=lib.engagements_db --cov=lib.worker_db --cov=lib.schedule_db \
            --cov-report=term-missing --cov-fail-under=75

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check for secrets in code
        run: |
          # Fail if bot tokens or credentials are committed
          if grep -rn "bot_token.*:" lib/ scripts/ tests/ --include="*.py" | grep -v "_config\|config_file\|cfg\|environ\|get("; then
            echo "ERROR: Possible hardcoded credentials found"
            exit 1
          fi
          echo "No hardcoded credentials found"

      - name: Check for dangerous patterns
        run: |
          # Fail if eval() or exec() are used (excludes Playwright's
          # page.evaluate and the Redis client's r.eval(), a Lua-script
          # call unrelated to Python's eval() builtin)
          if grep -rn "eval(\|exec(" lib/ scripts/ --include="*.py" | grep -v "page.evaluate\|#.*eval\|r\.eval\|redis.*\.eval("; then
            echo "ERROR: Dangerous eval/exec usage found"
            exit 1
          fi
          echo "No dangerous patterns found"

  frontend:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: persona/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: persona/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check & build
        run: npm run build

      - name: Lint
        run: npm run lint
